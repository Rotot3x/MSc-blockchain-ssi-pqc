name: PR Tests

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
    - name: Tests
      uses: ./.github/actions/run-unit-tests
      with:
        python-version: "3.12"
        os: "ubuntu-latest"
        is_pr: "true"
